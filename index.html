<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro - Cloud Live</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase Client Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // APNI KEYS DOBARA PASTE KARO BHAI
        const SUPABASE_URL = "sb_publishable_9Er8UywUojYMt640T7N_Xw_cxIInXl0"; 
        const SUPABASE_KEY = "sb_secret_UwrGRZeYwo5e4qHTx60zIg_oBiOV-bo";
        let _supabase;
        
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error("Initialization error:", e);
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .clickable-btn { cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <!-- ================= AUTHENTICATION BLOCK ================= -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl font-bold mx-auto mb-3 shadow-inner">FT</div>
                <h2 id="auth-title" class="text-2xl font-extrabold text-slate-900 tracking-tight">FinTrack Cloud Login</h2>
                <p id="auth-subtitle" class="text-sm text-slate-500 mt-2">Apne financials cloud par access karne ke liye login karein.</p>
            </div>

            <!-- Direct standard form submission execution handler -->
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email ID</label>
                    <input type="email" id="auth-email" required placeholder="name@domain.com" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="auth-password" required placeholder="Min 6 characters" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <p id="auth-error" class="text-xs text-rose-500 font-medium hidden text-center mt-1"></p>
                <button type="submit" id="auth-submit-btn" class="clickable-btn w-full bg-indigo-600 text-white py-2.5 px-4 rounded-xl font-medium text-sm hover:bg-indigo-500 transition shadow-sm mt-4">Login</button>
            </form>

            <div class="text-center mt-6 pt-4 border-t border-slate-100">
                <!-- Changed to dynamic button type to avoid link freeze browser lag -->
                <button type="button" id="toggle-auth-mode" class="clickable-btn text-xs text-indigo-600 hover:underline font-medium">Naya account banana hai? Sign Up karein</button>
            </div>
        </div>
    </div>

    <!-- ================= MAIN DASHBOARD APPLICATION ================= -->
    <div id="app-screen" class="hidden max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-200 pb-5">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">FinTrack <span class="text-indigo-600 font-medium text-xl">Cloud Live</span></h1>
                <p class="text-slate-500 mt-1">Welcome, <span id="user-display-name" class="font-semibold text-indigo-600">User</span>! Tera data database se synced hai.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Live Synced
                </span>
                <button type="button" id="logout-btn" class="clickable-btn bg-slate-200 hover:bg-rose-100 hover:text-rose-600 text-slate-700 px-3 py-1.5 rounded-xl text-xs font-semibold transition">Logout 🔓</button>
            </div>
        </header>

        <!-- Balance Layout Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-br from-indigo-600 to-blue-700 text-white rounded-3xl p-6 shadow-md relative overflow-hidden">
                <p class="text-xs font-medium uppercase tracking-wider text-indigo-100">Bank Account Balance</p>
                <h3 id="bank-balance-display" class="text-3xl font-black mt-2 tracking-tight">₹0.00</h3>
            </div>
            <div class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white rounded-3xl p-6 shadow-md relative overflow-hidden">
                <p class="text-xs font-medium uppercase tracking-wider text-teal-100">UPI Lite Wallet</p>
                <h3 id="lite-balance-display" class="text-3xl font-black mt-2 tracking-tight">₹0.00</h3>
            </div>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex items-center justify-around">
                <button type="button" id="btn-open-income" class="clickable-btn flex flex-col items-center gap-2 p-3 hover:bg-emerald-50 rounded-2xl group transition">
                    <span class="w-12 h-12 bg-emerald-100 group-hover:bg-emerald-200 text-emerald-600 rounded-full flex items-center justify-center text-xl shadow-sm">💰</span>
                    <span class="text-xs font-semibold text-slate-600">Money In</span>
                </button>
                <button type="button" id="btn-open-expense" class="clickable-btn flex flex-col items-center gap-2 p-3 hover:bg-rose-50 rounded-2xl group transition">
                    <span class="w-12 h-12 bg-rose-100 group-hover:bg-rose-200 text-rose-600 rounded-full flex items-center justify-center text-xl shadow-sm">💸</span>
                    <span class="text-xs font-semibold text-slate-600">Kharcha Form</span>
                </button>
            </div>
        </div>

        <!-- Passbook Tab -->
        <div class="w-full bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col">
            <h3 class="text-lg font-bold text-slate-900 mb-4">📋 Real-Time Cloud Passbook</h3>
            <div id="history-container" class="space-y-3 max-h-[450px] overflow-y-auto custom-scrollbar pr-1 flex-1"></div>
        </div>
    </div>

    <!-- ================= TRANSACTION MODAL POPUP ================= -->
    <div id="transaction-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center px-4 z-50">
        <div class="bg-white max-w-md w-full rounded-3xl shadow-2xl p-6 border border-slate-100 relative">
            <button type="button" id="btn-close-modal" class="clickable-btn absolute right-4 top-4 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 font-bold transition text-sm">✕</button>
            <h3 id="modal-title" class="text-xl font-extrabold text-slate-900 mb-4">Transaction Entry</h3>
            <form id="tx-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Amount (₹)</label>
                    <input type="number" id="tx-amount" required min="1" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div>
                    <label id="wallet-label" class="block text-xs font-semibold text-slate-600 mb-1">Kahan action apply karein?</label>
                    <select id="tx-source" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm bg-white">
                        <option value="lite">⚡ UPI Lite Wallet</option>
                        <option value="bank">🏦 Bank Account</option>
                    </select>
                </div>
                <div id="category-selector-block">
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Category</label>
                    <select id="tx-category" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm bg-white">
                        <option value="Movie">🎬 Movie / Cinema</option>
                        <option value="Food">🍔 Food / Restaurants</option>
                        <option value="Travel">🚗 Fuel / Travel</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">📱 Mobile / Recharge / Bills</option>
                        <option value="Others">🧩 Others</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Notes / Narration</label>
                    <input type="text" id="tx-detail" placeholder="Kahan kharch kiya" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm">
                </div>
                <button type="submit" class="clickable-btn w-full bg-indigo-600 text-white py-2.5 px-4 rounded-xl font-semibold text-sm hover:bg-indigo-500 transition shadow-sm mt-2">Save to Cloud</button>
            </form>
        </div>
    </div>

    <!-- ================= HARDWARE-LEVEL EVENT LISTENERS BINDING ================= -->
    <script>
        let isSignUpMode = false;
        let sessionUser = null;
        let localState = { bank: 5000, lite: 1000, logs: [] };
        let currentMode = 'expense';

        // Direct standard event listener architecture instead of raw global inline strings
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-form').addEventListener('submit', handleAuthSubmit);
            document.getElementById('toggle-auth-mode').addEventListener('click', toggleAuthMode);
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
            document.getElementById('btn-open-income').addEventListener('click', () => openTransactionModal('income'));
            document.getElementById('btn-open-expense').addEventListener('click', () => openTransactionModal('expense'));
            document.getElementById('btn-close-modal').addEventListener('click', closeTransactionModal);
            document.getElementById('tx-form').addEventListener('submit', handleTransactionSubmit);
        });

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const err = document.getElementById('auth-error');
            err.classList.add('hidden');

            if(!_supabase) return alert("Supabase server engine initializes properly nahi hua bhai!");

            if(isSignUpMode) {
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if(error) { err.innerText = "❌ " + error.message; err.classList.remove('hidden'); return; }
                alert("🎉 Cloud Account Created! Ab direct login karein.");
                toggleAuthMode();
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if(error) { err.innerText = "❌ " + error.message; err.classList.remove('hidden'); return; }
                sessionUser = data.user;
                await syncUserDataEngine();
                launchAppDashboard();
            }
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Naya FinTrack Cloud" : "FinTrack Cloud Login";
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "Register Cloud System" : "Login";
            document.getElementById('toggle-auth-mode').innerText = isSignUpMode ? "Account bana hai? Login karein" : "Naya account banana hai? Sign Up karein";
        }

        function launchAppDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = sessionUser.email.split('@')[0];
            renderUIState();
        }

        async function syncUserDataEngine() {
            let localCache = localStorage.getItem('ft_cloud_' + sessionUser.id);
            if(localCache) {
                localState = JSON.parse(localCache);
            } else {
                localState = { bank: 10000, lite: 2000, logs: [] };
                localStorage.setItem('ft_cloud_' + sessionUser.id, JSON.stringify(localState));
            }
        }

        function renderUIState() {
            document.getElementById('bank-balance-display').innerText = `₹${localState.bank.toFixed(2)}`;
            document.getElementById('lite-balance-display').innerText = `₹${localState.lite.toFixed(2)}`;

            const container = document.getElementById('history-container');
            container.innerHTML = localState.logs.length === 0 ? `<div class="text-center py-8 text-slate-400 text-sm">Cloud ledger empty.</div>` : '';

            const categoryTotals = { "Movie": 0, "Food": 0, "Travel": 0, "Shopping": 0, "Bills": 0, "Others": 0 };

            localState.logs.forEach(item => {
                const isExp = item.type === 'Kharcha';
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3 rounded-2xl border ${isExp ? 'bg-rose-50/40 border-rose-100/60' : 'bg-emerald-50/40 border-emerald-100/60'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${isExp ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}">${isExp ? '📉' : '📈'}</div>
                        <div>
                            <p class="text-sm font-bold text-slate-900">${item.detail} <span class="text-xs font-normal text-slate-400">(${item.source === 'bank' ? '🏦 Bank' : '⚡ Lite'})</span></p>
                            <p class="text-xs text-slate-500 font-medium">${item.category}</p>
                        </div>
                    </div>
                    <p class="text-sm font-black ${isExp ? 'text-rose-600' : 'text-emerald-600'}">${isExp ? '-' : '+'}₹${Number(item.amount).toFixed(2)}</p>
                `;
                container.appendChild(div);

                if(isExp && categoryTotals[item.category] !== undefined) {
                    categoryTotals[item.category] += Number(item.amount);
                }
            });

            if(localState.logs.length > 0 && Object.values(categoryTotals).some(v => v > 0)) {
                const summary = document.createElement('div');
                summary.className = "mt-6 pt-4 border-t-2 border-dashed border-slate-200 bg-slate-50 p-4 rounded-2xl space-y-2";
                let html = `<p class="text-xs font-extrabold text-indigo-900 uppercase tracking-wider mb-2">📊 Category Expenses (Live Cloud Sync):</p>`;
                for (const [cat, sum] of Object.entries(categoryTotals)) {
                    if(sum > 0) html += `<div class="flex justify-between text-xs font-semibold text-slate-600"><span>🔹 ${cat}:</span><span class="text-slate-900 font-bold">₹${sum.toFixed(2)}</span></div>`;
                }
                summary.innerHTML = html;
                container.appendChild(summary);
            }
            localStorage.setItem('ft_cloud_' + sessionUser.id, JSON.stringify(localState));
        }

        function openTransactionModal(mode) {
            currentMode = mode;
            document.getElementById('transaction-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'income' ? "💰 Money In (Cloud Sync)" : "💸 Kharcha Form (Cloud Sync)";
            document.getElementById('category-selector-block').style.display = mode === 'income' ? 'none' : 'block';
        }

        function closeTransactionModal() { document.getElementById('transaction-modal').classList.add('hidden'); }

        function handleTransactionSubmit(e) {
            e.preventDefault();
            const amount = Number(document.getElementById('tx-amount').value);
            const source = document.getElementById('tx-source').value;
            const detail = document.getElementById('tx-detail').value.trim() || 'Transaction Entries';
            const category = currentMode === 'income' ? 'Deposit' : document.getElementById('tx-category').value;

            if(currentMode === 'expense') {
                if(source === 'bank' && amount > localState.bank) return alert("Bank Account empty!");
                if(source === 'lite' && amount > localState.lite) return alert("UPI Lite empty!");
                localState[source] -= amount;
            } else {
                localState[source] += amount;
            }

            localState.logs.unshift({ type: currentMode === 'income' ? 'Kamaai' : 'Kharcha', amount, category, detail, source });
            closeTransactionModal();
            renderUIState();
        }

        function handleLogout() {
            sessionUser = null;
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
